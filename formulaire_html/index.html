<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de contact</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <h2>Formulaire de contact:</h2>
    <form action="/data.php">
        <label for="firstname">Prénom:</label><br>
        <input type="text" name="Prénom" pattern="[a-z]{4, 20}" value="" placeholder="Prénom" required>
        <br>
        <label for="name">Nom:</label><br>
        <input type="text" name="Nom" pattern="[a-z]{4, 20}" value="" placeholder="Nom" required>
        <br>
        <label for="birthday">Date de naissance:</label><br>
        <input type="datetime" name="Date de naissance" value="" placeholder="ex: 03/09/1992" required>
        <br>
        <label for="town">Ville:</label><br>
        <input type="text" name="Ville" pattern="[a-z]{4, 20}" value="" placeholder="Ville" required>
        <br>
        <label for="phone">Téléphone:</label><br>
        <input type="tel" name="Téléphone" value="" placeholder="ex: 03.21.**.**.**" required>
        <br><br>
        <input type="submit" value="Submit">
        <br>

    </form>

    <p>If you click the "Submit" button, the form-data will be sent to a page calle "/action_page.php".</p>

</body>
</html>
